<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreisatz-Master Mobile</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --primary: #4f46e5;
            --secondary: #10b981;
            --accent: #f59e0b;
            --text: #1f2937;
            --text-light: #6b7280;
        }

        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 500px; }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 { font-size: 1.5rem; color: var(--primary); text-align: center; margin-top: 0; }

        /* Navigation / Modi */
        .nav { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 20px; }
        .nav button {
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #e5e7eb;
            background: #f9fafb;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .nav button.active { border-color: var(--primary); color: var(--primary); background: #eff6ff; }

        /* Aufgabenbereich */
        .display {
            background: #f9fafb;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            line-height: 1.5;
            border: 1px solid #e5e7eb;
            margin-bottom: 15px;
            min-height: 120px;
        }

        .hint { font-size: 0.85rem; color: var(--accent); font-weight: bold; margin-bottom: 10px; text-align: center; }

        /* Eingabe & Check */
        .input-area { display: flex; flex-direction: column; gap: 10px; }
        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #e5e7eb;
            font-size: 1.2rem;
            text-align: center;
        }
        .main-btn {
            background: var(--secondary);
            color: white;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Taschenrechner Mini */
        .calc-toggle {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
            border: none;
            font-weight: 600;
        }
        #mini-calc {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            background: #374151;
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
        }
        #mini-calc button {
            padding: 15px 5px;
            border-radius: 8px;
            border: none;
            background: #4b5563;
            color: white;
            font-weight: bold;
        }
        #calc-screen {
            grid-column: span 4;
            background: #1f2937;
            color: #10b981;
            padding: 10px;
            text-align: right;
            font-family: monospace;
            font-size: 1.2rem;
            border-radius: 5px;
            margin-bottom: 5px;
        }

        /* Feedback */
        #res { display: none; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; margin-top: 15px; }

        /* Info Sektionen */
        .info-section { font-size: 0.9rem; color: var(--text-light); line-height: 1.4; }
        .info-section h3 { color: var(--text); font-size: 1rem; margin-bottom: 5px; }

        footer { text-align: center; margin-top: 20px; padding-bottom: 40px; border-top: 1px solid #e5e7eb; padding-top: 20px; width: 100%; }
        .contact { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Dreisatz-Master</h1>
        
        <div class="nav">
            <button onclick="changeMode('prop', this)" class="active">Proportional (gerade)</button>
            <button onclick="changeMode('anti', this)">Antiproportional (ungerade)</button>
            <button onclick="changeMode('mix', this)">Zusammengesetzt</button>
        </div>

        <div id="quest" class="display">Lädt...</div>

        <div class="hint">⚠️ Ergebnis auf 2 Stellen runden!</div>

        <div class="input-area">
            <input type="number" id="val" placeholder="0.00" step="0.01">
            <button class="main-btn" onclick="verify()">Ergebnis prüfen</button>
            <button class="main-btn" style="background: var(--primary)" onclick="next()">Nächste Aufgabe</button>
        </div>

        <div id="res"></div>

        <button class="calc-toggle" onclick="toggleCalc()">Taschenrechner ein/aus</button>
        <div id="mini-calc">
            <div id="calc-screen">0</div>
            <button onclick="calcIn('7')">7</button><button onclick="calcIn('8')">8</button><button onclick="calcIn('9')">9</button><button onclick="calcIn('/')">÷</button>
            <button onclick="calcIn('4')">4</button><button onclick="calcIn('5')">5</button><button onclick="calcIn('6')">6</button><button onclick="calcIn('*')">×</button>
            <button onclick="calcIn('1')">1</button><button onclick="calcIn('2')">2</button><button onclick="calcIn('3')">3</button><button onclick="calcIn('-')">-</button>
            <button onclick="calcIn('0')">0</button><button onclick="calcIn('.')">.</button><button onclick="calcClear()">C</button><button onclick="calcIn('+')">+</button>
            <button onclick="calcEval()" style="grid-column: span 4; background: var(--secondary);">=</button>
        </div>
    </div>

    <div class="card info-section">
        <h3>Kurzanleitung</h3>
        <p>1. Wähle oben die gewünschte Dreisatz-Art aus.<br>
        2. Berechne den Wert (Tipp: Erst auf 1 Einheit runterrechnen).<br>
        3. Gib die Zahl ein und klicke auf Prüfen.</p>
    </div>

    <footer>
        <p>Fragen oder Feedback?</p>
        <a href="mailto:deine-email@beispiel.de" class="contact">Kontakt zum Support</a>
    </footer>
</div>

<script>
    let currentMode = 'prop';
    let targetValue = 0;
    let calcExpr = "";

    const scenarios = {
        prop: [
            { s: "{a} Liter Saft kosten {b} €. Preis für {c} Liter?", f: (a,b,c) => (b/a)*c },
            { s: "Ein Auto fährt in {a} Std. {b} km. Strecke in {c} Std.?", f: (a,b,c) => (b/a)*c }
        ],
        anti: [
            { s: "{a} Pumpen füllen ein Becken in {b} Std. Zeit bei {c} Pumpen?", f: (a,b,c) => (a*b)/c },
            { s: "Vorrat reicht für {a} Tage bei {b}g/Tag. Tage bei {c}g/Tag?", f: (a,b,c) => (a*b)/c }
        ],
        mix: [
            { s: "{a} Lkw schaffen in {b} Tagen {c} t. Tonnen bei {d} Lkw in {e} Tagen?", f: (a,b,c,d,e) => (c/(a*b))*(d*e) }
        ]
    };

    function changeMode(m, btn) {
        currentMode = m;
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        next();
    }

    function next() {
        document.getElementById('res').style.display = 'none';
        document.getElementById('val').value = '';
        const list = scenarios[currentMode];
        const sc = list[Math.floor(Math.random() * list.length)];
        let a=rand(5,20), b=rand(10,100), c=rand(5,25), d=rand(2,10), e=rand(2,10);
        document.getElementById('quest').innerText = sc.s.replace('{a}',a).replace('{b}',b).replace('{c}',c).replace('{d}',d).replace('{e}',e);
        targetValue = (currentMode === 'mix') ? sc.f(a,b,c,d,e) : sc.f(a,b,c);
    }

    function verify() {
        const user = parseFloat(document.getElementById('val').value);
        const r = document.getElementById('res');
        r.style.display = 'block';
        const rounded = Math.round(targetValue * 100) / 100;
        if(Math.abs(user - rounded) < 0.02) {
            r.style.background = "#d1fae5"; r.style.color = "#065f46"; r.innerText = "✓ Richtig! (" + rounded.toFixed(2) + ")";
        } else {
            r.style.background = "#fee2e2"; r.style.color = "#991b1b"; r.innerText = "✗ Falsch. Lösung: " + rounded.toFixed(2);
        }
    }

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1) + min); }

    // Taschenrechner Logik
    function toggleCalc() {
        const c = document.getElementById('mini-calc');
        c.style.display = (c.style.display === 'grid') ? 'none' : 'grid';
    }
    function calcIn(v) { calcExpr += v; document.getElementById('calc-screen').innerText = calcExpr; }
    function calcClear() { calcExpr = ""; document.getElementById('calc-screen').innerText = "0"; }
    function calcEval() {
        try { calcExpr = eval(calcExpr).toString(); document.getElementById('calc-screen').innerText = calcExpr; }
        catch { document.getElementById('calc-screen').innerText = "Error"; calcExpr = ""; }
    }

    window.onload = next;
</script>
</body>
</html>
