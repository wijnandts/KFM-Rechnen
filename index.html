<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dreisatz-Master</title>
    <style>
        :root {
            --bg: #f3f4f6;
            --card: #ffffff;
            --primary: #4f46e5;
            --secondary: #10b981;
            --accent: #f59e0b;
            --text: #111827;
            --text-light: #6b7280;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 480px; }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 16px;
        }

        h1 { font-size: 1.4rem; color: var(--primary); text-align: center; margin-bottom: 20px; font-weight: 800; }

        .nav { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        
        .nav button {
            padding: 14px;
            border-radius: 14px;
            border: 2px solid #f3f4f6;
            background: #f9fafb;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
            color: var(--text-light);
        }
        
        .nav button.active { 
            border-color: var(--primary); 
            color: var(--primary); 
            background: #eef2ff; 
        }

        .display {
            background: #f8fafc;
            padding: 20px;
            border-radius: 18px;
            font-size: 1.1rem;
            line-height: 1.6;
            border: 1px solid #e2e8f0;
            margin-bottom: 16px;
            min-height: 100px;
            text-align: center;
        }

        .hint { 
            font-size: 0.85rem; 
            color: var(--accent); 
            font-weight: bold; 
            margin-bottom: 12px; 
            text-align: center; 
        }

        .input-area { display: flex; flex-direction: column; gap: 12px; }
        
        input {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 2px solid #e5e7eb;
            font-size: 1.3rem;
            text-align: center;
            appearance: none;
            outline: none;
        }
        
        input:focus { border-color: var(--primary); }

        .btn-check {
            background: var(--secondary);
            color: white;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .btn-next {
            background: var(--primary);
            color: white;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
        }

        #res { display: none; padding: 16px; border-radius: 14px; text-align: center; font-weight: bold; margin-top: 16px; }

        /* Taschenrechner Styles */
        .calc-toggle {
            background: #374151;
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            margin-top: 12px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        #mini-calc {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: #1f2937;
            padding: 16px;
            border-radius: 18px;
            margin-top: 12px;
        }

        #mini-calc button {
            padding: 15px 5px;
            border-radius: 10px;
            border: none;
            background: #4b5563;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
        }

        #calc-screen {
            grid-column: span 4;
            background: #111827;
            color: #10b981;
            padding: 12px;
            text-align: right;
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            border-radius: 10px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        footer { 
            text-align: center; 
            margin-top: 24px; 
            padding: 20px; 
            border-top: 1px solid #e5e7eb; 
            width: 100%;
            font-size: 0.9rem;
        }
        
        .contact { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Dreisatz-Master</h1>
        
        <div class="nav">
            <button onclick="changeMode('prop', this)" class="active">Proportional (gerade)</button>
            <button onclick="changeMode('anti', this)">Antiproportional (ungerade)</button>
            <button onclick="changeMode('mix', this)">Zusammengesetzt</button>
        </div>

        <div id="quest" class="display">Aufgabe wird erstellt...</div>

        <div class="hint">⚠️ Bitte auf 2 Dezimalstellen runden!</div>

        <div class="input-area">
            <input type="number" id="val" placeholder="0,00" step="0.01">
            <button class="btn-check" onclick="verify()">Ergebnis prüfen</button>
            <button class="btn-next" onclick="next()">Nächste Aufgabe</button>
        </div>

        <div id="res"></div>

        <button class="calc-toggle" onclick="toggleCalc()">Taschenrechner ein-/ausblenden</button>
        <div id="mini-calc">
            <div id="calc-screen">0</div>
            <button onclick="calcIn('7')">7</button><button onclick="calcIn('8')">8</button><button onclick="calcIn('9')">9</button><button onclick="calcIn('/')">÷</button>
            <button onclick="calcIn('4')">4</button><button onclick="calcIn('5')">5</button><button onclick="calcIn('6')">6</button><button onclick="calcIn('*')">×</button>
            <button onclick="calcIn('1')">1</button><button onclick="calcIn('2')">2</button><button onclick="calcIn('3')">3</button><button onclick="calcIn('-')">-</button>
            <button onclick="calcIn('0')">0</button><button onclick="calcIn('.')">,</button><button onclick="calcClear()" style="background: #991b1b">C</button><button onclick="calcIn('+')">+</button>
            <button onclick="calcEval()" style="grid-column: span 4; background: var(--secondary);">=</button>
        </div>
    </div>

    <footer>
        <p>Probleme oder Fragen?<br>
        <a href="mailto:support@deine-domain.de" class="contact">Kontakt aufnehmen</a></p>
    </footer>
</div>

<script>
    let currentMode = 'prop';
    let targetValue = 0;
    let calcExpr = "";

    const scenarios = {
        prop: [
            { s: "{a} kg Äpfel kosten {b} €. Wie viel kosten {c} kg?", f: (a,b,c) => (b/a)*c },
            { s: "Ein Auto verbraucht auf {a} km genau {b} l Kraftstoff. Wie hoch ist der Verbrauch auf {c} km?", f: (a,b,c) => (b/a)*c },
            { s: "Ein Mitarbeiter verdient in {a} Stunden {b} €. Wie viel verdient er in {c} Stunden?", f: (a,b,c) => (b/a)*c }
        ],
        anti: [
            { s: "{a} Arbeiter benötigen {b} h für eine Aufgabe. Wie lange brauchen {c} Arbeiter?", f: (a,b,c) => (a*b)/c },
            { s: "Ein Vorrat reicht für {a} Personen genau {b} Tage. Wie lange reicht er für {c} Personen?", f: (a,b,c) => (a*b)/c },
            { s: "Bei {a} km/h benötigt man {b} h für eine Strecke. Wie lange dauert es bei {c} km/h?", f: (a,b,c) => (a*b)/c }
        ],
        mix: [
            { s: "{a} Lkw transportieren in {b} Tagen insgesamt {c} t Kies. Wie viel schaffen {d} Lkw in {e} Tagen?", f: (a,b,c,d,e) => (c/(a*b))*(d*e) },
            { s: "{a} Pumpen fördern in {b} h genau {c} m³ Wasser. Wie viel fördern {d} Pumpen in {e} h?", f: (a,b,c,d,e) => (c/(a*b))*(d*e) },
            { s: "In {a} Tagen produzieren {b} Maschinen {c} Bauteile. Wie viele Bauteile schaffen {d} Maschinen in {e} Tagen?", f: (a,b,c,d,e) => (c/(a*b))*(d*e) }
        ]
    };

    function changeMode(m, btn) {
        currentMode = m;
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        next();
    }

    function next() {
        document.getElementById('res').style.display = 'none';
        document.getElementById('val').value = '';
        const list = scenarios[currentMode];
        const sc = list[Math.floor(Math.random() * list.length)];
        
        let a = rand(5, 20), b = rand(25, 150), c = rand(5, 25), d = rand(2, 10), e = rand(3, 12);
        
        let text = sc.s.replace('{a}', a).replace('{b}', b).replace('{c}', c).replace('{d}', d).replace('{e}', e);
        document.getElementById('quest').innerText = text;
        targetValue = (currentMode === 'mix') ? sc.f(a,b,c,d,e) : sc.f(a,b,c);
    }

    function verify() {
        const user = parseFloat(document.getElementById('val').value.replace(',', '.'));
        const r = document.getElementById('res');
        r.style.display = 'block';
        const rounded = Math.round(targetValue * 100) / 100;
        
        if(!isNaN(user) && Math.abs(user - rounded) < 0.015) {
            r.style.background = "#d1fae5"; r.style.color = "#065f46"; 
            r.innerHTML = "<b>Richtig!</b><br>Das Ergebnis ist " + rounded.toLocaleString('de-DE', {minimumFractionDigits: 2}) + ".";
        } else {
            r.style.background = "#fee2e2"; r.style.color = "#991b1b"; 
            r.innerHTML = "<b>Leider falsch.</b><br>Die richtige Lösung ist " + rounded.toLocaleString('de-DE', {minimumFractionDigits: 2}) + ".";
        }
    }

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1) + min); }

    function toggleCalc() {
        const c = document.getElementById('mini-calc');
        c.style.display = (window.getComputedStyle(c).display === 'none') ? 'grid' : 'none';
    }

    function calcIn(v) { calcExpr += v; document.getElementById('calc-screen').innerText = calcExpr; }
    function calcClear() { calcExpr = ""; document.getElementById('calc-screen').innerText = "0"; }
    function calcEval() {
        try { 
            let res = eval(calcExpr); 
            calcExpr = Number.isInteger(res) ? res.toString() : res.toFixed(3);
            document.getElementById('calc-screen').innerText = calcExpr.replace('.', ',');
        } catch { document.getElementById('calc-screen').innerText = "Fehler"; calcExpr = ""; }
    }

    window.onload = next;
</script>
</body>
</html>
